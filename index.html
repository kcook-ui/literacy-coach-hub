function uid() { return Math.random().toString(36).slice(2, 9); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}
function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d+"T12:00:00") - new Date()) / 86400000);
}

function detectLinkType(url) {
  if (!url) return { icon:"🔗", label:"Link", color:"#5b8dd9" };
  const u = url.toLowerCase();
  if (u.includes("docs.google.com/document"))     return { icon:"📄", label:"Google Doc",    color:"#4285f4" };
  if (u.includes("docs.google.com/spreadsheet"))  return { icon:"📊", label:"Google Sheet",  color:"#0f9d58" };
  if (u.includes("docs.google.com/presentation")) return { icon:"📽️", label:"Google Slides", color:"#f4b400" };
  if (u.includes("drive.google.com"))              return { icon:"📁", label:"Google Drive",  color:"#4285f4" };
  if (u.includes("docs.google.com/forms"))         return { icon:"📋", label:"Google Form",   color:"#7248b9" };
  if (u.includes("youtube.com") || u.includes("youtu.be")) return { icon:"▶️", label:"Video", color:"#ff0000" };
  if (u.includes("canva.com"))                     return { icon:"🎨", label:"Canva",         color:"#00c4cc" };
  if (u.includes("padlet.com"))                    return { icon:"📌", label:"Padlet",        color:"#ff6b6b" };
  if (u.includes("seesaw"))                        return { icon:"🟢", label:"Seesaw",        color:"#00a651" };
  return { icon:"🔗", label:"Link", color:"#5b8dd9" };
}

const LS_KEY = "literacy-coach-hub-v1";

export default function App() {
  const [schools, setSchools] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem(LS_KEY)); return d?.schools || INITIAL_SCHOOLS; } catch { return INITIAL_SCHOOLS; }
  });
  const [entries, setEntries] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem(LS_KEY)); return d?.entries || seed(INITIAL_SCHOOLS); } catch { return seed(INITIAL_SCHOOLS); }
  });
  const [view, setView] = useState("dashboard");
  const [filterSchool, setFilterSchool] = useState(null);
  const [filterTopic,  setFilterTopic]  = useState(null);
  const [filterGrade,  setFilterGrade]  = useState(null);
  const [tab, setTab]  = useState("tasks");
  const [modal, setModal] = useState(null);
  const [form,  setForm]  = useState({});
  const [search, setSearch] = useState("");
  const [confirm, setConfirm] = useState(null);
  const [saveToast, setSaveToast] = useState(false);
  const importRef = useRef(null);

  // ── persist to localStorage on every change ────────────────────────────────
  useEffect(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ schools, entries }));
      setSaveToast(true);
      const t = setTimeout(() => setSaveToast(false), 1800);
      return () => clearTimeout(t);
    } catch(e) { console.warn("localStorage unavailable", e); }
  }, [schools, entries]);

  // ── export ─────────────────────────────────────────────────────────────────
  function exportData() {
    const blob = new Blob([JSON.stringify({ schools, entries, exportedAt: new Date().toISOString() }, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `literacy-coach-hub-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── import ─────────────────────────────────────────────────────────────────
  function importData(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const d = JSON.parse(evt.target.result);
        if (d.schools && d.entries) {
          setSchools(d.schools);
          setEntries(d.entries);
          setModal(null);
          alert(`✅ Imported ${d.schools.length} schools and ${d.entries.length} entries.`);
        } else { alert("❌ Invalid file format."); }
      } catch { alert("❌ Could not read file."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── helpers ────────────────────────────────────────────────────────────────

  const topicMap  = Object.fromEntries(TOPICS.map(t  => [t.id, t]));
  const schoolMap = Object.fromEntries(schools.map(s => [s.id, s]));
  const gradeMap  = Object.fromEntries(GRADES.map(g  => [g.id, g]));

  function filteredEntries() {
    return entries.filter(e => {
      if (e.type !== tab) return false;
      if (filterSchool && e.schoolId !== filterSchool) return false;
      if (filterTopic  && e.topicId  !== filterTopic)  return false;
      if (filterGrade  && !(e.gradeIds||[]).includes(filterGrade)) return false;
      if (search && !e.title.toLowerCase().includes(search.toLowerCase())
                 && !e.notes.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }

  function openNew() {
    setForm({ type: tab, schoolId: filterSchool || schools[0].id,
      topicId: filterTopic || TOPICS[0].id, gradeIds: filterGrade ? [filterGrade] : [],
      priority:"medium", status:"planning", dueDate:"", title:"", notes:"", done:false, links:[] });
    setModal("entry");
  }

  function openEdit(entry) {
    setForm({ ...entry });
    setModal("entry");
  }

  function saveEntry() {
    if (!form.title?.trim()) return;
    if (form.id) {
      setEntries(es => es.map(e => e.id === form.id ? { ...form } : e));
    } else {
      setEntries(es => [...es, { ...form, id: uid(), createdAt: new Date().toISOString() }]);
    }
    setModal(null); setForm({});
  }

  function delEntry(id) { setEntries(es => es.filter(e => e.id !== id)); setConfirm(null); }
  function toggleDone(id) { setEntries(es => es.map(e => e.id === id ? { ...e, done: !e.done } : e)); }

  function addSchool(name) {
    if (!name.trim() || schools.find(s=>s.name===name)) return;
    const color = SCHOOL_COLORS[schools.length % SCHOOL_COLORS.length];
    setSchools(s => [...s, { id: uid(), name, color }]);
  }

  function delSchool(id) {
    setSchools(s => s.filter(x=>x.id!==id));
    setEntries(es => es.filter(e=>e.schoolId!==id));
    if (filterSchool === id) setFilterSchool(null);
    setConfirm(null);
  }

  // ── deadline data ──────────────────────────────────────────────────────────
  const deadlines = entries
    .filter(e => e.dueDate && !(e.type==="task" && e.done))
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate))
    .slice(0, 7);

  // ── stats ──────────────────────────────────────────────────────────────────
  const openTasks   = entries.filter(e=>e.type==="task"    && !e.done).length;
  const doneTasks   = entries.filter(e=>e.type==="task"    &&  e.done).length;
  const totalTasks  = openTasks + doneTasks;
  const projects    = entries.filter(e=>e.type==="project").length;
  const activeProj  = entries.filter(e=>e.type==="project" && e.status==="in-progress").length;

  // ── topic counts ───────────────────────────────────────────────────────────
  const topicCounts = Object.fromEntries(TOPICS.map(t => [t.id, entries.filter(e=>e.topicId===t.id).length]));

  // ── render ─────────────────────────────────────────────────────────────────
  return (
    <div className="hub">
      <style>{css}</style>

      {/* Header */}
      <div className="header">
        <div className="header-brand">
          <span style={{fontSize:34}}>📚</span>
          <div>
            <div className="header-title">Literacy Coach Hub</div>
            <div className="header-sub">Your coaching workspace</div>
          </div>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          <button className="data-bar" onClick={exportData} title="Download your data as a JSON backup file">
            ⬇️ Export
          </button>
          <button className="data-bar" onClick={()=>importRef.current?.click()} title="Restore from a previously exported file">
            ⬆️ Import
          </button>
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData} />
          <div style={{width:1, height:24, background:"rgba(255,255,255,.25)", margin:"0 4px"}} />
          {["dashboard","workspace"].map(v => (
            <button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>
              {v==="dashboard" ? "🏠 Overview" : "🗂 Workspace"}
            </button>
          ))}
        </div>
      </div>

      {/* Hidden file input for import already set above */}

      {/* Auto-save toast */}
      {saveToast && (
        <div className="save-toast">✓ Saved</div>
      )}

      <div className="body">

        {/* ── DASHBOARD ── */}
        {view === "dashboard" && (
          <div className="fade-up">

            {/* Stat strip */}
            <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:26}}>
              {[
                { label:"Schools",        value:schools.length,  icon:"🏫", bg:"linear-gradient(135deg,#e07b4f,#c47d1a)" },
                { label:"Open Tasks",     value:openTasks,       icon:"✅", bg:"linear-gradient(135deg,#5b8dd9,#3aab8c)" },
                { label:"Projects",       value:projects,        icon:"📋", bg:"linear-gradient(135deg,#c47db5,#9b7fd4)" },
                { label:"Active Projects",value:activeProj,      icon:"🔥", bg:"linear-gradient(135deg,#e8a838,#e05a5a)" },
              ].map(({label,value,icon,bg})=>(
                <div key={label} className="stat-card" style={{background:bg}}>
                  <div style={{fontSize:28,marginBottom:4}}>{icon}</div>
                  <div style={{fontFamily:"'Playfair Display',serif", fontSize:38, fontWeight:900, lineHeight:1}}>{value}</div>
                  <div style={{fontSize:13, marginTop:4, opacity:.85}}>{label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"grid", gridTemplateColumns:"1.1fr 1fr", gap:18, marginBottom:18}}>

              {/* Topic overview */}
              <div className="card">
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
                  <h3 style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700}}>📖 Literacy Topics</h3>
                  <span style={{fontSize:12, color:"#b0906a"}}>Click to filter workspace</span>
                </div>
                <div className="topic-grid">
                  {TOPICS.map(t => (
                    <div key={t.id} className="topic-tile"
                      style={{background:t.color+"18", borderColor: filterTopic===t.id ? t.color : "transparent"}}
                      onClick={()=>{ setFilterTopic(t.id===filterTopic?null:t.id); setView("workspace"); }}>
                      <div style={{fontSize:22}}>{t.emoji}</div>
                      <div style={{fontSize:12, fontWeight:700, color:t.color, marginTop:3}}>{t.label}</div>
                      <div className="topic-count" style={{color:t.color}}>{topicCounts[t.id]||0}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Deadlines + schools */}
              <div style={{display:"flex", flexDirection:"column", gap:16}}>

                {/* Upcoming */}
                <div className="card" style={{flex:1}}>
                  <h3 style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, marginBottom:14}}>⏰ Upcoming Deadlines</h3>
                  {deadlines.length===0
                    ? <div style={{color:"#b0906a", fontSize:13, fontStyle:"italic"}}>All clear — no upcoming deadlines!</div>
                    : deadlines.map(e => {
                        const days = daysUntil(e.dueDate);
                        const school = schoolMap[e.schoolId];
                        const topic  = topicMap[e.topicId];
                        const overdue = days < 0;
                        const soon    = days >= 0 && days <= 3;
                        return (
                          <div key={e.id} className="dl-row"
                            style={{background: overdue?"#fee2e218": soon?"#fef3c718":"transparent"}}
                            onClick={()=>{ setView("workspace"); setFilterSchool(e.schoolId); setTab(e.type==="task"?"tasks":"projects"); }}>
                            <span style={{fontSize:18}}>{e.type==="task"?"✅":"📋"}</span>
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{fontWeight:700, fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{e.title}</div>
                              <div style={{fontSize:11, color:"#b0906a", marginTop:1}}>
                                {school?.name} · <span style={{color:topic?.color}}>{topic?.label}</span>
                              </div>
                            </div>
                            <span className="due-badge" style={{
                              background: overdue?"#fee2e2":soon?"#fef3c7":"#f0e8de",
                              color: overdue?"#b91c1c":soon?"#92400e":"#7a5a3a"}}>
                              {overdue ? `${Math.abs(days)}d late` : days===0 ? "Today!" : `${days}d`}
                            </span>
                          </div>
                        );
                      })
                  }
                </div>

                {/* Task completion bar */}
                {totalTasks > 0 && (
                  <div className="card">
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
                      <span style={{fontWeight:700, fontSize:14}}>Task Completion</span>
                      <span style={{fontSize:13, color:"#7a5a3a"}}>{doneTasks}/{totalTasks}</span>
                    </div>
                    <div className="prog-bar">
                      <div className="prog-fill" style={{width:`${Math.round(doneTasks/totalTasks*100)}%`, background:"linear-gradient(90deg,#6abf69,#3aab8c)"}} />
                    </div>
                    <div style={{fontSize:12, color:"#b0906a", marginTop:6}}>{Math.round(doneTasks/totalTasks*100)}% done — keep it up!</div>
                  </div>
                )}
              </div>
            </div>

            {/* School buildings */}
            <div className="card">
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
                <h3 style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700}}>🏫 School Buildings</h3>
                <button className="btn btn-primary btn-sm" onClick={()=>{ setForm({name:""}); setModal("school"); }}>+ Add School</button>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10}}>
                {schools.map(s => {
                  const cnt = entries.filter(e=>e.schoolId===s.id).length;
                  const tasks = entries.filter(e=>e.schoolId===s.id && e.type==="task" && !e.done).length;
                  const projs = entries.filter(e=>e.schoolId===s.id && e.type==="project").length;
                  return (
                    <div key={s.id} style={{borderRadius:14, padding:"16px 18px", background:s.color+"14", border:`2px solid ${s.color}44`, cursor:"pointer", transition:".2s"}}
                      onClick={()=>{ setFilterSchool(s.id); setView("workspace"); }}>
                      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                        <div style={{fontWeight:700, fontSize:15, color:s.color}}>{s.name}</div>
                        <button onClick={e=>{e.stopPropagation(); setConfirm({type:"school",id:s.id,label:s.name});}}
                          style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:14,lineHeight:1}}>✕</button>
                      </div>
                      <div style={{marginTop:10, display:"flex", gap:8}}>
                        <span style={{fontSize:12, background:s.color+"22", color:s.color, borderRadius:10, padding:"2px 9px", fontWeight:700}}>{tasks} tasks</span>
                        <span style={{fontSize:12, background:s.color+"22", color:s.color, borderRadius:10, padding:"2px 9px", fontWeight:700}}>{projs} projects</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── WORKSPACE ── */}
        {view === "workspace" && (
          <div style={{display:"grid", gridTemplateColumns:"220px 1fr", gap:20}} className="fade-up">

            {/* Sidebar */}
            <div>
              <div className="card" style={{marginBottom:14}}>
                <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", color:"#b0906a", marginBottom:10}}>Schools</div>
                <button className={`school-tab ${!filterSchool?"active":""}`}
                  style={!filterSchool?{background:"#c47d1a"}:{}}
                  onClick={()=>setFilterSchool(null)}>
                  <span>🏫</span> All Schools
                </button>
                {schools.map(s=>(
                  <button key={s.id} className={`school-tab ${filterSchool===s.id?"active":""}`}
                    style={filterSchool===s.id ? {background:s.color} : {}}
                    onClick={()=>setFilterSchool(filterSchool===s.id?null:s.id)}>
                    <span style={{width:10,height:10,borderRadius:"50%",background:s.color,display:"inline-block",flexShrink:0}}></span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12}}>{s.name}</span>
                  </button>
                ))}
              </div>

              <div className="card">
                <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", color:"#b0906a", marginBottom:10}}>Topics</div>
                <button className={`school-tab ${!filterTopic?"active":""}`}
                  style={!filterTopic?{background:"#c47d1a"}:{}}
                  onClick={()=>setFilterTopic(null)}>
                  📖 All Topics
                </button>
                {TOPICS.map(t=>(
                  <button key={t.id} className={`school-tab ${filterTopic===t.id?"active":""}`}
                    style={filterTopic===t.id?{background:t.color}:{}}
                    onClick={()=>setFilterTopic(filterTopic===t.id?null:t.id)}>
                    <span style={{fontSize:14}}>{t.emoji}</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12}}>{t.label}</span>
                  </button>
                ))}
              </div>

              <div className="card" style={{marginTop:14}}>
                <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", color:"#b0906a", marginBottom:10}}>Grade Level</div>
                <button className={`school-tab ${!filterGrade?"active":""}`}
                  style={!filterGrade?{background:"#c47d1a"}:{}}
                  onClick={()=>setFilterGrade(null)}>
                  🎓 All Grades
                </button>
                {GRADES.map(g=>(
                  <button key={g.id} className={`school-tab ${filterGrade===g.id?"active":""}`}
                    style={filterGrade===g.id?{background:g.color}:{}}
                    onClick={()=>setFilterGrade(filterGrade===g.id?null:g.id)}>
                    <span style={{width:22,height:22,borderRadius:6,background:g.color+"22",color:g.color,
                      display:"inline-flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:900,flexShrink:0}}>{g.short}</span>
                    <span style={{fontSize:12}}>{g.label}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Main */}
            <div>
              {/* Toolbar */}
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:16, flexWrap:"wrap"}}>
                <div style={{display:"flex", background:"#fff", borderRadius:12, padding:4, boxShadow:"0 1px 6px rgba(0,0,0,.07)", gap:4}}>
                  {[{id:"tasks",label:"✅ Tasks"},{id:"projects",label:"📋 Projects"}].map(({id,label})=>(
                    <button key={id} onClick={()=>setTab(id)} style={{
                      padding:"7px 20px", borderRadius:9, border:"none", cursor:"pointer",
                      fontFamily:"Lato,sans-serif", fontSize:13, fontWeight:700,
                      background:tab===id ? "linear-gradient(135deg,#c47d1a,#bf5e2e)" : "transparent",
                      color:tab===id?"#fff":"#7a5a3a", transition:".2s"}}>
                      {label}
                    </button>
                  ))}
                </div>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
                  className="input" style={{width:200,padding:"8px 14px",borderRadius:22}} />
                <div style={{flex:1}}/>
                <button className="btn btn-primary" onClick={openNew}>
                  + New {tab==="tasks"?"Task":"Project"}
                </button>
              </div>

              {/* Active filters */}
              {(filterSchool || filterTopic || filterGrade) && (
                <div style={{display:"flex", gap:8, marginBottom:14, flexWrap:"wrap"}}>
                  {filterSchool && <FilterChip label={schoolMap[filterSchool]?.name} color={schoolMap[filterSchool]?.color} onRemove={()=>setFilterSchool(null)} />}
                  {filterTopic  && <FilterChip label={topicMap[filterTopic]?.label}  color={topicMap[filterTopic]?.color}  onRemove={()=>setFilterTopic(null)} />}
                  {filterGrade  && <FilterChip label={`Grade: ${gradeMap[filterGrade]?.label}`} color={gradeMap[filterGrade]?.color} onRemove={()=>setFilterGrade(null)} />}
                </div>
              )}

              {/* Entries */}
              {filteredEntries().length === 0
                ? <div className="empty">
                    <div className="empty-icon">{tab==="tasks"?"✅":"📋"}</div>
                    <div style={{fontFamily:"'Playfair Display',serif", fontSize:20, marginBottom:8}}>Nothing here yet!</div>
                    <div style={{fontSize:14}}>Create your first {tab==="tasks"?"task":"project"} to get started.</div>
                  </div>
                : filteredEntries().map(entry => (
                    <EntryCard key={entry.id} entry={entry}
                      school={schoolMap[entry.schoolId]} topic={topicMap[entry.topicId]}
                      grades={(entry.gradeIds||[]).map(id=>gradeMap[id]).filter(Boolean)}
                      onEdit={()=>openEdit(entry)}
                      onDelete={()=>setConfirm({type:"entry",id:entry.id,label:entry.title})}
                      onToggle={()=>toggleDone(entry.id)} />
                  ))
              }
            </div>
          </div>
        )}
      </div>

      {/* ── ENTRY MODAL ── */}
      {modal === "entry" && (
        <div className="overlay">
          <div className="modal fade-up">
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22}}>
              <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700}}>
                {form.id ? "Edit" : "New"} {form.type==="task"?"Task":"Project"}
              </h2>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"#b0906a"}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label className="label">Title *</label>
                <input className="input" value={form.title||""} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="What needs to be done?" />
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label className="label">School Building</label>
                  <select className="input" value={form.schoolId||""} onChange={e=>setForm(f=>({...f,schoolId:e.target.value}))}>
                    {schools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="label">Literacy Topic</label>
                  <select className="input" value={form.topicId||""} onChange={e=>setForm(f=>({...f,topicId:e.target.value}))}>
                    {TOPICS.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label className="label">Due Date</label>
                  <input type="date" className="input" value={form.dueDate||""} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} />
                </div>
                <div>
                  {tab==="tasks"
                    ? <>
                        <label className="label">Priority</label>
                        <select className="input" value={form.priority||"medium"} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>
                          {PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                        </select>
                      </>
                    : <>
                        <label className="label">Status</label>
                        <select className="input" value={form.status||"planning"} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
                          {PROJ_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                      </>
                  }
                </div>
              </div>
              <div>
                <label className="label">Notes / Outline</label>
                <textarea className="input" value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Add details, next steps, observations…" />
              </div>
              <div>
                <label className="label">Grade Level(s)</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"10px 12px",borderRadius:10,border:"2px solid #e8ddd0",background:"#fdf8f1"}}>
                  {GRADES.map(g=>{
                    const selected = (form.gradeIds||[]).includes(g.id);
                    return (
                      <button key={g.id} type="button"
                        onClick={()=>setForm(f=>({...f, gradeIds: selected
                          ? (f.gradeIds||[]).filter(id=>id!==g.id)
                          : [...(f.gradeIds||[]), g.id]}))}
                        style={{padding:"4px 11px",borderRadius:16,border:`2px solid ${selected?g.color:g.color+"44"}`,
                          background:selected?g.color:g.color+"14",color:selected?"#fff":g.color,
                          fontFamily:"Lato,sans-serif",fontSize:12,fontWeight:700,cursor:"pointer",transition:".15s"}}>
                        {g.short !== g.label.slice(0,g.short.length) ? g.short : g.label}
                      </button>
                    );
                  })}
                </div>
                <div style={{fontSize:11,color:"#b0906a",marginTop:4}}>Select all that apply</div>
              </div>
              <LinkManager links={form.links||[]} onChange={links=>setForm(f=>({...f,links}))} />
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:22}}>
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveEntry}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD SCHOOL MODAL ── */}
      {modal === "school" && (
        <div className="overlay">
          <div className="modal fade-up" style={{width:380}}>
            <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, marginBottom:20}}>Add School Building</h2>
            <label className="label">School Name</label>
            <input className="input" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Jefferson Primary" />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>{addSchool(form.name);setModal(null);}}>Add</button>
            </div>
          </div>
        </div>
      )}

      {/* ── CONFIRM DELETE ── */}
      {confirm && (
        <div className="overlay">
          <div className="modal fade-up" style={{width:360, textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:10}}>⚠️</div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>Delete this {confirm.type==="school"?"school":"item"}?</h3>
            <p style={{color:"#9a7a5a",fontSize:14,marginBottom:22}}>
              "{confirm.label}" {confirm.type==="school"?"and all its entries":""} will be permanently removed.
            </p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={()=>confirm.type==="school"?delSchool(confirm.id):delEntry(confirm.id)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Sub-components ────────────────────────────────────────────────────────────

function EntryCard({ entry, school, topic, grades, onEdit, onDelete, onToggle }) {
  const [expanded, setExpanded] = useState(false);
  const isTask = entry.type === "task";
  const days   = daysUntil(entry.dueDate);
  const overdue = days !== null && days < 0 && !(isTask && entry.done);
  const soon    = days !== null && days >= 0 && days <= 3 && !(isTask && entry.done);

  const pri  = PRIORITIES.find(p=>p.id===entry.priority);
  const stat = PROJ_STATUSES.find(s=>s.id===entry.status);

  return (
    <div className="entry-card fade-up" style={{borderLeftColor: topic?.color||"#ccc", opacity: isTask&&entry.done?.65:1}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        {isTask && (
          <button className={`cb ${entry.done?"done":""}`} onClick={onToggle}>
            {entry.done && "✓"}
          </button>
        )}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:4}}>
            <span style={{fontWeight:700,fontSize:15,textDecoration:isTask&&entry.done?"line-through":"none"}}>
              {entry.title}
            </span>
            {topic && (
              <span className="tpill" style={{background:topic.color+"1a",color:topic.color}}>
                {topic.emoji} {topic.label}
              </span>
            )}
            {isTask && pri && (
              <span className="tpill" style={{background:pri.bg,color:pri.fg}}>{pri.label}</span>
            )}
            {!isTask && stat && (
              <span className="tpill" style={{background:stat.bg,color:stat.fg}}>{stat.label}</span>
            )}
            {entry.dueDate && (
              <span className="due-badge" style={{
                background:overdue?"#fee2e2":soon?"#fef3c7":"#f0e8de",
                color:overdue?"#b91c1c":soon?"#92400e":"#7a5a3a"}}>
                📅 {overdue?`${Math.abs(days)}d overdue`:days===0?"Today":fmtDate(entry.dueDate)}
              </span>
            )}
          </div>
          {school && (
            <div style={{fontSize:12,color:"#b0906a",marginBottom:6,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{background:school.color+"1a",color:school.color,borderRadius:8,padding:"1px 8px",fontWeight:700}}>{school.name}</span>
              {grades && grades.length > 0 && grades.map(g=>(
                <span key={g.id} style={{background:g.color+"18",color:g.color,borderRadius:8,padding:"1px 8px",fontWeight:700,fontSize:11,border:`1px solid ${g.color}44`}}>
                  🎓 {g.label}
                </span>
              ))}
            </div>
          )}
          {entry.notes && (
            <div>
              <div style={{fontSize:13,color:"#6b5040",lineHeight:1.55,whiteSpace:"pre-wrap",
                maxHeight:expanded?"none":"56px",overflow:"hidden"}}>
                {entry.notes}
              </div>
              {entry.notes.length > 100 && (
                <button onClick={()=>setExpanded(e=>!e)}
                  style={{background:"none",border:"none",cursor:"pointer",color:"#c47d1a",fontSize:12,padding:"2px 0",fontWeight:700}}>
                  {expanded?"▲ Less":"▼ More"}
                </button>
              )}
            </div>
          )}
          {entry.links && entry.links.length > 0 && (
            <div style={{marginTop:8}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#b0906a",marginBottom:5}}>📎 Attachments</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {entry.links.map(link=>{
                  const lt = detectLinkType(link.url);
                  return (
                    <a key={link.id} href={link.url} target="_blank" rel="noopener noreferrer"
                      style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 11px",
                        borderRadius:20,background:lt.color+"14",border:`1.5px solid ${lt.color}44`,
                        color:lt.color,fontSize:12,fontWeight:700,textDecoration:"none",transition:".15s",
                        maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                      title={link.url}>
                      <span>{lt.icon}</span>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{link.label || lt.label}</span>
                      <span style={{opacity:.5,fontSize:10}}>↗</span>
                    </a>
                  );
                })}
              </div>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          <button onClick={onEdit}  style={{background:"#f0e8de",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,padding:"5px 9px",color:"#7a5a3a"}}>✏️</button>
          <button onClick={onDelete} style={{background:"#fee2e2",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,padding:"5px 9px",color:"#b91c1c"}}>🗑</button>
        </div>
      </div>
    </div>
  );
}

function LinkManager({ links, onChange }) {
  const [url,   setUrl]   = useState("");
  const [label, setLabel] = useState("");
  const [error, setError] = useState("");

  function addLink() {
    const trimmed = url.trim();
    if (!trimmed) return;
    try { new URL(trimmed.startsWith("http") ? trimmed : "https://"+trimmed); }
    catch { setError("Please enter a valid URL."); return; }
    const finalUrl = trimmed.startsWith("http") ? trimmed : "https://"+trimmed;
    const lt = detectLinkType(finalUrl);
    onChange([...links, { id: uid(), url: finalUrl, label: label.trim() || lt.label }]);
    setUrl(""); setLabel(""); setError("");
  }

  function removeLink(id) { onChange(links.filter(l=>l.id!==id)); }

  return (
    <div>
      <label className="label" style={{display:"block",marginBottom:8}}>📎 Links & Attachments</label>
      {links.length > 0 && (
        <div style={{marginBottom:8}}>
          {links.map(link=>{
            const lt = detectLinkType(link.url);
            return (
              <div key={link.id} className="link-row">
                <span style={{fontSize:16}}>{lt.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:lt.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{link.label}</div>
                  <div style={{fontSize:11,color:"#b0906a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{link.url}</div>
                </div>
                <span className="link-type-badge" style={{background:lt.color+"18",color:lt.color}}>{lt.label}</span>
                <button onClick={()=>removeLink(link.id)} style={{background:"#fee2e2",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,padding:"3px 7px",color:"#b91c1c",flexShrink:0}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      <div style={{background:"#fdf8f1",borderRadius:10,border:"2px solid #e8ddd0",padding:"10px 12px"}}>
        <div style={{fontSize:11,color:"#9a7a5a",fontWeight:700,marginBottom:7}}>ADD A LINK</div>
        <input value={url} onChange={e=>{setUrl(e.target.value);setError("");}}
          placeholder="Paste URL (Google Drive, Doc, Slides, any link…)"
          className="input" style={{marginBottom:7}}
          onKeyDown={e=>e.key==="Enter"&&addLink()} />
        <div style={{display:"flex",gap:8}}>
          <input value={label} onChange={e=>setLabel(e.target.value)}
            placeholder="Label (optional — e.g. 'Lesson Plan')"
            className="input" style={{flex:1}}
            onKeyDown={e=>e.key==="Enter"&&addLink()} />
          <button onClick={addLink} className="btn btn-primary btn-sm" style={{flexShrink:0}}>+ Add</button>
        </div>
        {error && <div style={{color:"#b91c1c",fontSize:12,marginTop:5}}>{error}</div>}
        <div style={{fontSize:11,color:"#b0906a",marginTop:6}}>
          🔵 Google Docs · Sheets · Slides · Drive folders · YouTube · Canva · any URL
        </div>
      </div>
    </div>
  );
}

function FilterChip({ label, color, onRemove }) {
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,
      background:color+"18",border:`1.5px solid ${color}44`,fontSize:12,fontWeight:700,color:color}}>
      {label}
      <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:color,fontSize:14,lineHeight:1,padding:0}}>✕</button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
