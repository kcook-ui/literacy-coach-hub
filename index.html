<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#fdf8f1;font-family:Lato,sans-serif;color:#2d231a}
.header{background:linear-gradient(135deg,#bf5e2e 0%,#c47d1a 50%,#bf5e2e 100%);padding:0 24px;display:flex;align-items:center;justify-content:space-between;min-height:70px;flex-wrap:wrap;gap:8px}
.htitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff}
.hsub{font-size:11px;color:rgba(255,255,255,.75)}
.hbrand{display:flex;align-items:center;gap:12px}
.hactions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 0}
.nbtn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:22px;padding:6px 16px;font-family:Lato,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.nbtn:hover,.nbtn.on{background:rgba(255,255,255,.38)}
.dbtn{background:rgba(255,255,255,.12);border-radius:10px;padding:5px 12px;font-size:12px;color:#fff;font-weight:700;cursor:pointer;border:none;font-family:Lato,sans-serif}
.dbtn:hover{background:rgba(255,255,255,.24)}
.body{max-width:1140px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.sc{border-radius:16px;padding:18px 20px;color:#fff}
.stab{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;border:none;background:transparent;width:100%;text-align:left;font-family:Lato,sans-serif;color:#2d231a}
.stab:hover{background:rgba(0,0,0,.05)}
.stab.on{color:#fff}
.ec{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid #ccc;transition:.2s}
.ec:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.cb{width:22px;height:22px;border-radius:50%;border:2.5px solid #ddd;background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.cb.dn{background:#6abf69;border-color:#6abf69;color:#fff}
.ov{position:fixed;inset:0;background:rgba(45,35,26,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.mo{background:#fffef9;border-radius:20px;padding:28px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.18)}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9a7a5a;margin-bottom:5px;display:block}
.inp{width:100%;padding:9px 12px;border-radius:10px;border:2px solid #e8ddd0;font-family:Lato,sans-serif;font-size:14px;background:#fdf8f1;outline:none;color:#2d231a}
.inp:focus{border-color:#c47d1a;background:#fff}
textarea.inp{height:100px;resize:vertical}
.btn{border:none;border-radius:22px;padding:8px 20px;font-family:Lato,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.bp{background:linear-gradient(135deg,#c47d1a,#bf5e2e);color:#fff}
.bg{background:#f0e8de;color:#7a5a3a}
.bd{background:#fee2e2;color:#b91c1c}
.bs{padding:5px 12px;font-size:12px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.due{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ttile{border-radius:14px;padding:12px;cursor:pointer;border:3px solid transparent;transition:.15s}
.ttile:hover{transform:scale(1.03)}
.ttile.on{border-color:#2d231a}
.tcnt{font-size:22px;font-weight:900;font-family:'Playfair Display',serif;margin-top:2px}
.pb{height:6px;border-radius:3px;background:#e8ddd0;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:.4s}
.dlr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;cursor:pointer}
.dlr:hover{background:#f5ede3}
.empty{text-align:center;padding:50px 0;color:#b0906a}
.lr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;background:#fdf8f1;border:1.5px solid #e8ddd0;margin-bottom:6px}
.lr:hover{border-color:#c47d1a}
.ltb{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.toast{position:fixed;bottom:22px;right:22px;background:#2d231a;color:#fff;padding:8px 16px;border-radius:22px;font-size:13px;font-weight:700;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.22);pointer-events:none}
.wsgrid{display:grid;grid-template-columns:210px 1fr;gap:18px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scard{border-radius:14px;padding:16px;cursor:pointer;transition:.2s}
.scard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.tabbar{display:flex;background:#fff;border-radius:12px;padding:4px;box-shadow:0 1px 6px rgba(0,0,0,.07);gap:3px}
.tabbtn{padding:7px 18px;border-radius:9px;border:none;cursor:pointer;font-family:Lato,sans-serif;font-size:13px;font-weight:700}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fu{animation:fu .3s ease both}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f0e8de}::-webkit-scrollbar-thumb{background:#c47d1a;border-radius:3px}
@media(max-width:680px){.wsgrid{grid-template-columns:1fr}.fg2{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr 1fr}.header{padding:10px 14px}}
</style>

function App(){
  const[schools,setSchools]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(LSK));return d&&d.schools?d.schools:IS;}catch(e){return IS;}});
  const[entries,setEntries]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(LSK));return d&&d.entries?d.entries:seed(IS);}catch(e){return seed(IS);}});
  const[view,setView]=useState("dashboard");
  const[fSch,setFSch]=useState(null);
  const[fTop,setFTop]=useState(null);
  const[fGr,setFGr]=useState(null);
  const[tab,setTab]=useState("tasks");
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[search,setSearch]=useState("");
  const[confirm,setConfirm]=useState(null);
  const[toast,setToast]=useState(false);
  const impRef=useRef(null);

  useEffect(()=>{
    try{localStorage.setItem(LSK,JSON.stringify({schools,entries}));setToast(true);const t=setTimeout(()=>setToast(false),1600);return()=>clearTimeout(t);}catch(e){}
  },[schools,entries]);

  const TM=Object.fromEntries(TOPICS.map(t=>[t.id,t]));
  const SM=Object.fromEntries(schools.map(s=>[s.id,s]));
  const GM=Object.fromEntries(GRADES.map(g=>[g.id,g]));

  function doExport(){
    const b=new Blob([JSON.stringify({schools,entries,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="literacy-coach-hub-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(a.href);
  }
  function doImport(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.schools&&d.entries){setSchools(d.schools);setEntries(d.entries);alert("Imported "+d.schools.length+" schools and "+d.entries.length+" entries.");}else alert("Invalid file.");}catch(err){alert("Could not read file.");}};
    r.readAsText(f);e.target.value="";
  }
  function filtered(){
    return entries.filter(e=>{
      if(e.type!==tab)return false;
      if(fSch&&e.schoolId!==fSch)return false;
      if(fTop&&e.topicId!==fTop)return false;
      if(fGr&&!(e.gradeIds||[]).includes(fGr))return false;
      if(search){const q=search.toLowerCase();if(!e.title.toLowerCase().includes(q)&&!(e.notes||"").toLowerCase().includes(q))return false;}
      return true;
    });
  }
  function sf(u){setForm(f=>Object.assign({},f,u));}
  function openNew(){setForm({type:tab,schoolId:fSch||schools[0].id,topicId:fTop||TOPICS[0].id,gradeIds:fGr?[fGr]:[],priority:"medium",status:"planning",dueDate:"",title:"",notes:"",done:false,links:[]});setModal("entry");}
  function openEdit(e){setForm(Object.assign({},e));setModal("entry");}
  function saveEntry(){
    if(!(form.title||"").trim())return;
    if(form.id){setEntries(es=>es.map(e=>e.id===form.id?Object.assign({},form):e));}
    else{setEntries(es=>es.concat([Object.assign({},form,{id:uid(),createdAt:new Date().toISOString()})]));}
    setModal(null);setForm({});
  }
  function delEntry(id){setEntries(es=>es.filter(e=>e.id!==id));setConfirm(null);}
  function toggleDone(id){setEntries(es=>es.map(e=>e.id===id?Object.assign({},e,{done:!e.done}):e));}
  function addSchool(name){if(!name.trim())return;setSchools(s=>s.concat([{id:uid(),name,color:SCOLS[s.length%SCOLS.length]}]));}
  function delSchool(id){setSchools(s=>s.filter(x=>x.id!==id));setEntries(es=>es.filter(e=>e.schoolId!==id));if(fSch===id)setFSch(null);setConfirm(null);}

  const dl=entries.filter(e=>e.dueDate&&!(e.type==="task"&&e.done)).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,7);
  const openT=entries.filter(e=>e.type==="task"&&!e.done).length;
  const doneT=entries.filter(e=>e.type==="task"&&e.done).length;
  const totT=openT+doneT;
  const projs=entries.filter(e=>e.type==="project").length;
  const actP=entries.filter(e=>e.type==="project"&&e.status==="in-progress").length;
  const tCnt=Object.fromEntries(TOPICS.map(t=>[t.id,entries.filter(e=>e.topicId===t.id).length]));

  function D(tag,props){
    const args=[tag,props||null];
    for(let i=2;i<arguments.length;i++)args.push(arguments[i]);
    return ce.apply(null,args);
  }

  const filt=filtered();

  return D("div",{style:{minHeight:"100vh"}},
    // HEADER
    D("div",{className:"header"},
      D("div",{className:"hbrand"},
        D("span",{style:{fontSize:32}},"📚"),
        D("div",null,D("div",{className:"htitle"},"Literacy Coach Hub"),D("div",{className:"hsub"},"Your coaching workspace"))
      ),
      D("div",{className:"hactions"},
        D("button",{className:"dbtn",onClick:doExport},"⬇️ Export"),
        D("button",{className:"dbtn",onClick:()=>impRef.current&&impRef.current.click()},"⬆️ Import"),
        D("input",{ref:impRef,type:"file",accept:".json",style:{display:"none"},onChange:doImport}),
        D("div",{style:{width:1,height:22,background:"rgba(255,255,255,.25)"}}),
        D("button",{className:"nbtn"+(view==="dashboard"?" on":""),onClick:()=>setView("dashboard")},"🏠 Overview"),
        D("button",{className:"nbtn"+(view==="workspace"?" on":""),onClick:()=>setView("workspace")},"🗂 Workspace")
      )
    ),
    toast&&D("div",{className:"toast"},"✓ Saved"),
    D("div",{className:"body"},

    // ── DASHBOARD ──
    view==="dashboard"&&D("div",{className:"fu"},
      D("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}},
        ...[
          {label:"Schools",value:schools.length,icon:"🏫",bg:"linear-gradient(135deg,#e07b4f,#c47d1a)"},
          {label:"Open Tasks",value:openT,icon:"✅",bg:"linear-gradient(135deg,#5b8dd9,#3aab8c)"},
          {label:"Projects",value:projs,icon:"📋",bg:"linear-gradient(135deg,#c47db5,#9b7fd4)"},
          {label:"Active Projects",value:actP,icon:"🔥",bg:"linear-gradient(135deg,#e8a838,#e05a5a)"},
        ].map(function(s){return D("div",{key:s.label,className:"sc",style:{background:s.bg}},
          D("div",{style:{fontSize:26,marginBottom:4}},s.icon),
          D("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:900,lineHeight:1}},s.value),
          D("div",{style:{fontSize:13,marginTop:4,opacity:.85}},s.label)
        );})
      ),
      D("div",{style:{display:"grid",gridTemplateColumns:"1.1fr 1fr",gap:16,marginBottom:16}},
        D("div",{className:"card"},
          D("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
            D("h3",{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700}},"📖 Literacy Topics"),
            D("span",{style:{fontSize:12,color:"#b0906a"}},"Click to filter")
          ),
          D("div",{className:"tgrid"},
            ...TOPICS.map(function(t){return D("div",{key:t.id,className:"ttile"+(fTop===t.id?" on":""),
              style:{background:t.color+"18",borderColor:fTop===t.id?t.color:"transparent"},
              onClick:function(){setFTop(t.id===fTop?null:t.id);setView("workspace");}},
              D("div",{style:{fontSize:20}},t.emoji),
              D("div",{style:{fontSize:11,fontWeight:700,color:t.color,marginTop:2}},t.label),
              D("div",{className:"tcnt",style:{color:t.color}},tCnt[t.id]||0)
            );})
          )
        ),
        D("div",{style:{display:"flex",flexDirection:"column",gap:14}},
          D("div",{className:"card",style:{flex:1}},
            D("h3",{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,marginBottom:12}},"⏰ Upcoming Deadlines"),
            dl.length===0?D("div",{style:{color:"#b0906a",fontSize:13,fontStyle:"italic"}},"All clear!"):
            dl.map(function(e){
              const d=days(e.dueDate),ov=d<0,sn=d>=0&&d<=3;
              return D("div",{key:e.id,className:"dlr",style:{background:ov?"#fee2e218":sn?"#fef3c718":"transparent"},
                onClick:function(){setView("workspace");setFSch(e.schoolId);setTab(e.type==="task"?"tasks":"projects");}},
                D("span",{style:{fontSize:16}},e.type==="task"?"✅":"📋"),
                D("div",{style:{flex:1,minWidth:0}},
                  D("div",{style:{fontWeight:700,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.title),
                  D("div",{style:{fontSize:11,color:"#b0906a"}},SM[e.schoolId]&&SM[e.schoolId].name)
                ),
                D("span",{className:"due",style:{background:ov?"#fee2e2":sn?"#fef3c7":"#f0e8de",color:ov?"#b91c1c":sn?"#92400e":"#7a5a3a"}},
                  ov?Math.abs(d)+"d late":d===0?"Today":d+"d"
                )
              );
            })
          ),
          totT>0&&D("div",{className:"card"},
            D("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
              D("span",{style:{fontWeight:700,fontSize:14}},"Task Completion"),
              D("span",{style:{fontSize:13,color:"#7a5a3a"}},doneT+"/"+totT)
            ),
            D("div",{className:"pb"},D("div",{className:"pf",style:{width:Math.round(doneT/totT*100)+"%",background:"linear-gradient(90deg,#6abf69,#3aab8c)"}})),
            D("div",{style:{fontSize:12,color:"#b0906a",marginTop:5}},Math.round(doneT/totT*100)+"% done")
          )
        )
      ),
      D("div",{className:"card"},

function EntryCard(props){
  const entry=props.entry,school=props.school,topic=props.topic,grades=props.grades,onEdit=props.onEdit,onDelete=props.onDelete,onToggle=props.onToggle;
  const[exp,setExp]=useState(false);
  const isTask=entry.type==="task";
  const d=days(entry.dueDate);
  const ov=d!==null&&d<0&&!(isTask&&entry.done);
  const sn=d!==null&&d>=0&&d<=3&&!(isTask&&entry.done);
  const pri=PRIS.filter(function(p){return p.id===entry.priority;})[0];
  const stat=STATS.filter(function(s){return s.id===entry.status;})[0];
  function D(tag,p){const a=[tag,p||null];for(let i=2;i<arguments.length;i++)a.push(arguments[i]);return ce.apply(null,a);}
  return D("div",{className:"ec fu",style:{borderLeftColor:(topic&&topic.color)||"#ccc",opacity:isTask&&entry.done?0.6:1}},
    D("div",{style:{display:"flex",alignItems:"flex-start",gap:10}},
      isTask&&D("button",{className:"cb"+(entry.done?" dn":""),onClick:onToggle},entry.done?"✓":null),
      D("div",{style:{flex:1,minWidth:0}},
        D("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}},
          D("span",{style:{fontWeight:700,fontSize:14,textDecoration:isTask&&entry.done?"line-through":"none"}},entry.title),
          topic&&D("span",{className:"pill",style:{background:topic.color+"1a",color:topic.color}},topic.emoji+" "+topic.label),
          isTask&&pri&&D("span",{className:"pill",style:{background:pri.bg,color:pri.fg}},pri.label),
          !isTask&&stat&&D("span",{className:"pill",style:{background:stat.bg,color:stat.fg}},stat.label),
          entry.dueDate&&D("span",{className:"due",style:{background:ov?"#fee2e2":sn?"#fef3c7":"#f0e8de",color:ov?"#b91c1c":sn?"#92400e":"#7a5a3a"}},
            "📅 "+(ov?Math.abs(d)+"d overdue":d===0?"Today":fmt(entry.dueDate))
          )
        ),
        school&&D("div",{style:{fontSize:11,color:"#b0906a",marginBottom:5,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}},
          D("span",{style:{background:school.color+"1a",color:school.color,borderRadius:8,padding:"1px 7px",fontWeight:700}},school.name),
          ...(grades||[]).map(function(g){return D("span",{key:g.id,style:{background:g.color+"18",color:g.color,borderRadius:8,padding:"1px 7px",fontWeight:700,fontSize:10,border:"1px solid "+g.color+"44"}},"🎓 "+g.label);})
        ),
        entry.notes&&D("div",null,
          D("div",{style:{fontSize:12,color:"#6b5040",lineHeight:1.55,whiteSpace:"pre-wrap",maxHeight:exp?"none":"54px",overflow:"hidden"}},entry.notes),
          entry.notes.length>80&&D("button",{onClick:function(){setExp(function(v){return !v;});},style:{background:"none",border:"none",cursor:"pointer",color:"#c47d1a",fontSize:11,padding:"1px 0",fontWeight:700}},exp?"▲ Less":"▼ More")
        ),
        entry.links&&entry.links.length>0&&D("div",{style:{marginTop:7}},
          D("div",{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#b0906a",marginBottom:4}},"📎 Attachments"),
          D("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
            ...(entry.links||[]).map(function(link){
              const lt=ltype(link.url);
              return D("a",{key:link.id,href:link.url,target:"_blank",rel:"noopener noreferrer",
                style:{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:lt.color+"14",border:"1.5px solid "+lt.color+"44",color:lt.color,fontSize:11,fontWeight:700,textDecoration:"none",maxWidth:210,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
                D("span",null,lt.icon),
                D("span",{style:{overflow:"hidden",textOverflow:"ellipsis"}},link.label||lt.label),
                D("span",{style:{opacity:.5,fontSize:9}},"↗")
              );
            })
          )
        )
      ),
      D("div",{style:{display:"flex",gap:5,flexShrink:0}},
        D("button",{onClick:onEdit,style:{background:"#f0e8de",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,padding:"4px 8px",color:"#7a5a3a"}},"✏️"),
        D("button",{onClick:onDelete,style:{background:"#fee2e2",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,padding:"4px 8px",color:"#b91c1c"}},"🗑")
      )
    )
  );
}

function LinkManager(props){
  const links=props.links,onChange=props.onChange;
  const[url,setUrl]=useState("");
  const[label,setLabel]=useState("");
  const[err,setErr]=useState("");
  function D(tag,p){const a=[tag,p||null];for(let i=2;i<arguments.length;i++)a.push(arguments[i]);return ce.apply(null,a);}
  function add(){
    const t=url.trim();if(!t)return;
    let fu=t.indexOf("http")===0?t:"https://"+t;
    try{new URL(fu);}catch(e){setErr("Enter a valid URL.");return;}
    const lt=ltype(fu);
    onChange(links.concat([{id:uid(),url:fu,label:label.trim()||lt.label}]));
    setUrl("");setLabel("");setErr("");
  }
  return D("div",null,
    D("label",{className:"lbl",style:{display:"block",marginBottom:6}},"📎 Links & Attachments"),
    links.length>0&&D("div",{style:{marginBottom:6}},
      ...links.map(function(link){
        const lt=ltype(link.url);
        return D("div",{key:link.id,className:"lr"},
          D("span",{style:{fontSize:15}},lt.icon),
          D("div",{style:{flex:1,minWidth:0}},
            D("div",{style:{fontWeight:700,fontSize:12,color:lt.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},link.label),
            D("div",{style:{fontSize:10,color:"#b0906a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},link.url)
          ),
          D("span",{className:"ltb",style:{background:lt.color+"18",color:lt.color}},lt.label),
          D("button",{onClick:function(){onChange(links.filter(function(l){return l.id!==link.id;}));},style:{background:"#fee2e2",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#b91c1c",flexShrink:0}},"✕")
        );
      })
    ),
    D("div",{style:{background:"#fdf8f1",borderRadius:10,border:"2px solid #e8ddd0",padding:"10px 12px"}},
      D("div",{style:{fontSize:10,color:"#9a7a5a",fontWeight:700,marginBottom:6}},"ADD A LINK"),
      D("input",{value:url,onChange:function(e){setUrl(e.target.value);setErr("");},placeholder:"Paste any URL…",className:"inp",style:{marginBottom:6},onKeyDown:function(e){if(e.key==="Enter")add();}}),
      D("div",{style:{display:"flex",gap:7}},
        D("input",{value:label,onChange:function(e){setLabel(e.target.value);},placeholder:"Label (optional)",className:"inp",style:{flex:1},onKeyDown:function(e){if(e.key==="Enter")add();}}),
        D("button",{onClick:add,className:"btn bp bs",style:{flexShrink:0}},"+ Add")
      ),
      err&&D("div",{style:{color:"#b91c1c",fontSize:11,marginTop:4}},err),
      D("div",{style:{fontSize:10,color:"#b0906a",marginTop:5}},"Google Docs · Drive · Slides · YouTube · Canva · any URL")
    )
  );
}
